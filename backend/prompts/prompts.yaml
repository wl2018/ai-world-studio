# ---------------------------------------------------------------------------
# Diary system prompt (getWorldDiaryPrompt)
# ---------------------------------------------------------------------------

diary_system:
  en: |
    I am writing a diary titled "{{world_name}}"{{description_clause}}. The protagonist is "{{user_display_name}}". {{requirement_clause}}This is a running diary where each entry is presented as a conversation log, and each entry can be summarized into a complete paragraph with a title. (The characters in the diary will not know about the existence of this diary.)
  zh-TW: |
    我正在寫關於「{{world_name}}」的日記{{description_clause}}。主角是「{{user_display_name}}」。{{requirement_clause}}這是流水式的日記，每篇都以對話紀錄方式呈現，並且每篇都可以整理為一個段落的完整摘要，加上一個標題。（日記中的人物不會知道這本日記的存在。）
  zh-CN: |
    我正在写关于「{{world_name}}」的日记{{description_clause}}。主角是「{{user_display_name}}」。{{requirement_clause}}这是流水式的日记，每篇都以对话记录方式呈现，并且每篇都可以整理为一个段落的完整摘要，加上一个标题。（日记中的人物不会知道这本日记的存在。）

# description clause inserted into diary_system when description is present
diary_system_description_clause:
  en: ", which is about {{description}}"
  zh-TW: "，內容是描寫{{description}}"
  zh-CN: "，内容是描写{{description}}"

# ---------------------------------------------------------------------------
# Diary command messages (genDiaryCommandMessages / genDiarySummaryMessages)
# ---------------------------------------------------------------------------

diary_cmd_has_previous:
  en: "\n\nIn a moment I will give you the next conversation log for you to turn into a title and summary."
  zh-TW: "\n\n等一下我開始告訴你下一篇的對話紀錄，你再幫我做成標題和摘要。"
  zh-CN: "\n\n等一下我开始告诉你下一篇的对话记录，你再帮我做成标题和摘要。"

diary_cmd_skip_info:
  en: "Don't fill in the Info section — I'll add that myself when needed."
  zh-TW: "資訊那欄你不要寫，那個我認為需要才會加。"
  zh-CN: "信息那栏你不要写，那个我认为需要才会加。"

diary_cmd_previous_summary_header:
  en: "\n\nThe summaries I have already written are as follows:\n\n"
  zh-TW: "\n\n我已經有寫好的摘要如下：\n\n"
  zh-CN: "\n\n我已经写好的摘要如下：\n\n"

diary_cmd_first_entry:
  en: "\n\nIn a moment I will give you the very first conversation log for you to turn into a title and summary."
  zh-TW: "\n\n等一下我開始告訴你第一篇的對話紀錄，你再幫我做成標題和摘要。"
  zh-CN: "\n\n等一下我开始告诉你第一篇的对话记录，你再帮我做成标题和摘要。"

diary_cmd_assistant_ack:
  en: "Got it. Please paste the conversation log and I'll give you the title and summary right away."
  zh-TW: "好的，請貼出對話紀錄，我立刻給你標題和摘要。"
  zh-CN: "好的，请贴出对话记录，我立刻给你标题和摘要。"

# ---------------------------------------------------------------------------
# Character generation prompts (genDiaryCharacter)
# ---------------------------------------------------------------------------

char_gen_check_name:
  en: |
    The next diary entry has a character described as "{{description}}". Can we determine their exact name?
    If yes, output JSON: {"contains_name":true,"name":"exact name"}
    If no, output JSON: {"contains_name":false,"name":null}
    Output directly without any explanation.
  zh-TW: |
    再來要寫的日記中有一個「{{description}}」，是否可以得知其確切的名字：
    可以請輸出JSON:{"contains_name":true,"name":"確切的名字"}
    不行請輸出JSON:{"contains_name":false,"name":null}
    直接輸出不做任何說明。
  zh-CN: |
    接下来要写的日记中有一个「{{description}}」，是否可以得知其确切的名字：
    可以请输出JSON:{"contains_name":true,"name":"确切的名字"}
    不行请输出JSON:{"contains_name":false,"name":null}
    直接输出不做任何说明。

char_gen_assign_name:
  en: "The next diary entry has a character described as \"{{description}}\". Give them a name — it can be someone who has appeared before or a new person, as long as it doesn't conflict with existing characters."
  zh-TW: "再來要寫的日記中有一個「{{description}}」。可以給之前出現過的，也可以給沒出現過的。給我一個名字，不和之前內容衝突即可。"
  zh-CN: "接下来要写的日记中有一个「{{description}}」。可以给之前出现过的，也可以给没出现过的。给我一个名字，不和之前内容冲突即可。"

char_gen_assign_name_many:
  en: "The next diary entry has a character described as \"{{description}}\". Give them a name — it can be someone who has appeared before or a new person, as long as it doesn't conflict with existing characters. Give me {{count}} possibilities."
  zh-TW: "再來要寫的日記中有一個「{{description}}」。可以給之前出現過的，也可以給沒出現過的。給我一個名字，不和之前內容衝突即可。給我{{count}}種可能性。"
  zh-CN: "接下来要写的日记中有一个「{{description}}」。可以给之前出现过的，也可以给没出现过的。给我一个名字，不和之前内容冲突即可。給我{{count}}種可能性。"

char_gen_assign_name_json:
  en: "Now output your answer in JSON format: [{\"name\":\"the name\"}]. The name should not include any additional translations. If the name is in Chinese, always use Traditional Chinese."
  zh-TW: "現在以JSON格式輸出你的答案:[{\"name\":\"名字\"}]。名字不包含額外的翻譯。名字如果是中文的，一律使用繁體中文。"
  zh-CN: "现在以JSON格式输出你的答案:[{\"name\":\"名字\"}]。名字不包含额外的翻译。名字如果是中文的，一律使用简体中文。"

char_gen_transfer_sentence:
  en: "Rewrite the following text as a declarative sentence describing \"{{name}}\" (keep the content and wording exactly the same, only change the sentence structure): \"{{description}}\". Output your answer in JSON format: {name, description}."
  zh-TW: "將這文字改變句型（但不增減內容也不改變用詞），轉換為用來描述「{{name}}」的直述句：「{{description}}」。以JSON格式輸出你的答案:{name,description}。"
  zh-CN: "将这段文字改变句型（但不增减内容也不改变用词），转换为用来描述「{{name}}」的陈述句：「{{description}}」。以JSON格式输出你的答案:{name,description}。"

char_gen_diary_note:
  en: "(This person will appear in the next diary entry.)"
  zh-TW: "（這個人是再來要寫的日記會出現的一個人。）"
  zh-CN: "（这个人是接下来要写的日记会出现的一个人。）"

char_gen_with_description:
  en: "The next diary entry has a character described as \"{{description}}\". Give them a name and a {{detail_flag}}description — it can be someone who has appeared before or a new person, as long as it doesn't conflict with existing characters."
  zh-TW: "再來要寫的日記中有一個「{{description}}」。可以給之前出現過的，也可以給沒出現過的。給我一個名字和{{detail_flag}}描述，不和之前內容衝突即可。"
  zh-CN: "接下来要写的日记中有一个「{{description}}」。可以给之前出现过的，也可以给没出现过的。给我一个名字和{{detail_flag}}描述，不和之前内容冲突即可。"

char_gen_detail_flag_long:
  en: "a detailed paragraph of "
  zh-TW: "一個段落的詳細"
  zh-CN: "一个段落的详细"

char_gen_with_description_json:
  en: "Now output your answer in JSON format without explanation, as an array of objects each with two properties: name and description. Use only the name itself, no additional translations. For Chinese names, always use Traditional Chinese."
  zh-TW: "現在以JSON格式輸出你的答案，不做說明，用一個陣列裡面包物件，物件有兩個屬性name和description。名字只用名字，不包含額外的翻譯。遇到中文一律使用繁體中文。"
  zh-CN: "现在以JSON格式输出你的答案，不做说明，用一个数组里面包对象，对象有两个属性name和description。名字只用名字，不包含额外的翻译。遇到中文一律使用简体中文。"

# ---------------------------------------------------------------------------
# Scene generation prompts (genDiaryScene)
# ---------------------------------------------------------------------------

scene_gen_prompt:
  en: "The diary entry has a scene described as \"{{description}}\". Give me a {{detail_flag}}description of the scene. Output your answer in JSON format: {\"description\":\"scene description\"}"
  zh-TW: "要寫的日記中有個場景「{{description}}」，現在給我場景的{{detail_flag}}描述。在以JSON格式輸出你的答案：{\"description\":\"場景{{detail_flag_short}}描述\"}"
  zh-CN: "要写的日记中有个场景「{{description}}」，现在给我场景的{{detail_flag}}描述。以JSON格式输出你的答案：{\"description\":\"场景{{detail_flag_short}}描述\"}"

scene_gen_detail_flag_long:
  en: "detailed paragraph "
  zh-TW: "一個段落的詳細"
  zh-CN: "一个段落的详细"

scene_gen_detail_flag_short:
  en: ""
  zh-TW: "詳細"
  zh-CN: "详细"

# ---------------------------------------------------------------------------
# Action generation prompts (genDiaryAction)
# ---------------------------------------------------------------------------

action_gen_prompt:
  en: "The diary entry has an action/situation described as \"{{description}}\". Give me a {{detail_flag}}description of it. Output your answer in JSON format: {\"description\":\"description\"}"
  zh-TW: "要寫的日記中個動作/情況「{{description}}」，現在給我這個動作/情況的{{detail_flag}}描述。在以JSON格式輸出你的答案：{\"description\":\"{{detail_flag_short}}描述\"}"
  zh-CN: "要写的日记中有个动作/情况「{{description}}」，现在给我这个动作/情况的{{detail_flag}}描述。以JSON格式输出你的答案：{\"description\":\"{{detail_flag_short}}描述\"}"

action_gen_detail_flag_long:
  en: "detailed paragraph "
  zh-TW: "一個段落的詳細"
  zh-CN: "一个段落的详细"

action_gen_detail_flag_short:
  en: ""
  zh-TW: "詳細"
  zh-CN: "详细"

