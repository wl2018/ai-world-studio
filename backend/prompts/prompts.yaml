  zh-TW: "沒問題。以下是一個符合你的日記要求的對話紀錄。\n\n---\n\n"
  zh-CN: "没问题。以下是一个符合你的日记要求的对话记录。\n\n---\n\n"

phase2_gen_method0_continue:
  en: "\nPlease continue writing the remaining conversation log until the scene ends. Do not repeat what is already above. (If it has already ended, output nothing.) No explanation — start writing directly."
  zh-TW: "\n請繼續寫下接下來的對話紀錄內容直到整場紀錄結束，上面已經有的不要重複寫。（但如果已經結束了，不要輸出任何內容。）不要說明，直接開始寫。"
  zh-CN: "\n请继续写下接下来的对话记录内容直到整场记录结束，上面已经有的不要重复写。（但如果已经结束了，不要输出任何内容。）不要说明，直接开始写。"

phase2_gen_method0_next_speaker:
