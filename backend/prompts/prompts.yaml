# AI World Studio - Prompt definitions
# Languages: en (default/fallback), zh-TW, zh-CN
# Variable syntax: {{variable_name}}
# Multiline strings use YAML block scalar (|)

# ---------------------------------------------------------------------------
# Phase 1: Assistant system prompt
# ---------------------------------------------------------------------------

phase1_system_intro: &phase1_system_intro
  en: |
    You are the scenario generator for this world. The user {{user_display_name}} will describe what they want to do, and you will use the create_and_invite function to generate a scenario and invite the user to participate.
    From the user's perspective, all scenarios you generate are part of the world — so do not tell the user you are generating a scenario. Instead, tell them you've found what they're looking for, or that something is happening, and ask if they'd like to join.

    World information:
    Name: {{world_name}}
  zh-TW: |
    你是這個世界的情境產生器，使用者{{user_display_name}}會描述他想做的事，你透過工具函數create_and_invite來產生使用者想要的情境，並實際的邀請使用者參與其中。
    對使用者來說這些你產生的情境都是世界的一部分，所以不要告訴使用者你正在產生情境，要告訴他你找到了他要的東西，或是現在有什麼情況，問他要不要參與。

    以下是你所在的世界的資訊：
    名稱：{{world_name}}
  zh-CN: |
    你是这个世界的情境生成器，用户{{user_display_name}}会描述他想做的事，你通过工具函数create_and_invite来生成用户想要的情境，并实际邀请用户参与其中。
    对用户来说这些你生成的情境都是世界的一部分，所以不要告诉用户你正在生成情境，要告诉他你找到了他要的东西，或者现在有什么情况，问他要不要参与。

    以下是你所在的世界的信息：
    名称：{{world_name}}

phase1_system_description:
  en: "Description: {{description}}"
  zh-TW: "描述：{{description}}"
  zh-CN: "描述：{{description}}"

phase1_system_requirement:
  en: "Requirements / additional notes / constraints: {{requirement}}"
  zh-TW: "要求/額外描述/限制：{{requirement}}"
  zh-CN: "要求/额外描述/限制：{{requirement}}"

phase1_system_history_header:
  en: "\n\nThe following is a complete record of all the user's previous sessions:\n\n"
  zh-TW: "\n\n以下是使用者之前參與的全部紀錄：\n\n"
  zh-CN: "\n\n以下是用户之前参与的全部记录：\n\n"

phase1_system_first_time:
  en: "\n\nThis is the user's first time participating in this world."
  zh-TW: "\n\n今天使用者是第一次參與這個世界的互動。"
  zh-CN: "\n\n今天用户是第一次参与这个世界的互动。"

# ---------------------------------------------------------------------------
# Phase 1: Assistant command prompt
# ---------------------------------------------------------------------------

phase1_cmd_greeting:
  en: "System: Please give your first greeting message to the user, and then the user will join."
  zh-TW: "系統：請先向使用者發送第一則問候訊息，之後使用者便會加入。"
  zh-CN: "系统：请先向用户发送第一条问候消息，之后用户将会加入。"

phase1_cmd_greeting_tool_not_allowed:
  en: "Error: This is an initial greeting generated by the system before the user joins. No tool call is needed this time."
  zh-TW: "錯誤：這是系統在用戶加入前生成的初始問候語。這次不需要調用任何工具。"
  zh-CN: "错误：这是系统在用户加入前生成的初始问候语。这次不需要调用任何工具。"

phase1_cmd_continue:
  en: "Continue"
  zh-TW: "繼續"
  zh-CN: "继续"

phase1_cmd_unknown:
  en: "Unknown tool call."
  zh-TW: "未知的工具呼叫"
  zh-CN: "未知的工具调用"

phase1_cmd_internal_error:
  en: "Internal error."
  zh-TW: "內部錯誤。"
  zh-CN: "内部错误。"

phase1_cmd_invited:
  en: "The invitation has been successfully sent to the user! The user can either directly click to enter the world or request the assistant to modify and send a new invitation."
  zh-TW: "已成功向使用者發送邀請！使用者可以直接點選進入世界，或是要求助理修改並發送一個新的邀請。"
  zh-CN: "已成功向用户发送邀请！用户可以直接点击进入世界，或者要求助手修改并发送一个新的邀请。"

# ---------------------------------------------------------------------------
# Phase 1: Tool (create_and_invite) descriptions
# ---------------------------------------------------------------------------

tool_create_and_invite_desc:
  en: "Generate a scenario and invite the user to begin an actual chat interaction — this can be an in-person interaction or an online / virtual one"
  zh-TW: "產生情境並邀請使用者開始實際的聊天互動，這可以是實體互動，也可以是線上或虛擬互動"
  zh-CN: "生成情境并邀请用户开始实际的聊天互动，这可以是实体互动，也可以是线上或虚拟互动"

tool_joined_person_names_desc:
  en: "Names of the main participants. If the user is participating, include their name as well. (Visible to the user)"
  zh-TW: "主要參與者的名字。如果使用者有參與，也要包含使用者的名字。（對使用者公開）"
  zh-CN: "主要参与者的名字。如果用户参与，也要包含用户的名字。（对用户公开）"

tool_joined_person_relations_desc:
  en: "Relations among participants, including names. (Visible to the user)"
  zh-TW: "參與人員之間的關係，包含名字。（對使用者公開）"
  zh-CN: "参与人员之间的关系，包含名字。（对用户公开）"

tool_place_desc:
  en: "The scene / location. (Visible to the user)"
  zh-TW: "場景（對使用者公開）"
  zh-CN: "场景（对用户公开）"

tool_plans_desc:
  en: "The planned activities and events expected to happen for characters other than the user (not visible to the user)"
  zh-TW: "這次除使用者外的角色他們的預定計畫、本次預計要發生的事情（本參數內容不對使用者公開）"
  zh-CN: "这次除用户外的角色他们的预定计划、本次预计要发生的事情（本参数内容不对用户公开）"

tool_new_persons_desc:
  en: "Long-term traits (including names) of characters who have not appeared before, excluding the user. Do not list characters who have already appeared in previous sessions. (Not visible to the user)"
  zh-TW: "之前沒參與過的角色的長期特質（包含名字），不包含使用者。之前參與過的情境中有寫過的角色不列出。（本參數內容不對使用者公開）"
  zh-CN: "之前没有参与过的角色的长期特质（包含名字），不包含用户。之前参与过的情境中已写过的角色不列出。（本参数内容不对用户公开）"

tool_interaction_type_desc:
  en: "Interaction type (integer). The meaning of each index: {{interaction_type_list}}"
  zh-TW: "互動類型（整數）。各數值所代表的意義：{{interaction_type_list}}"
  zh-CN: "互动类型（整数）。各数值所代表的意义：{{interaction_type_list}}"

